name: anas_portfolio
description: "Anas - Flutter & Dart Developer Portfolio"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  animated_text_kit: ^4.2.2
  visibility_detector: ^0.4.0+2
  flutter_animate: ^4.5.0
  supabase_flutter: ^2.5.6
  image_picker: ^1.1.2
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  file_picker: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
